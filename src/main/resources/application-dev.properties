## Dev profile overrides
server.error.include-message=always

# Actuator (dev): aberto para facilitar debug local
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.shutdown.enabled=true

# CORS (dev): permitir apenas origens locais e o front.base.url
# (lista separada por vírgula)
cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080

# Em dev o front geralmente roda local
front.base.url=${FRONT_BASE_URL:http://localhost:4200}

# Swagger: em dev fica sem Basic por padrão; para testar: SWAGGER_BASIC_AUTH_ENABLED=true + usuário/senha
swagger.basic-auth.enabled=${SWAGGER_BASIC_AUTH_ENABLED:false}
