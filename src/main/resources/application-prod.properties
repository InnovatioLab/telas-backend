## Prod profile overrides

# Não vazar detalhes de erro para o cliente
server.error.include-message=never

# Actuator (prod): expor o mínimo necessário
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.shutdown.enabled=false

# CORS (prod): allowlist explícita (sem localhost)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://telas-ads.com,https://www.telas-ads.com}

# Front em produção
front.base.url=${FRONT_BASE_URL:https://telas-ads.com}

# Swagger / OpenAPI: HTTP Basic (SWAGGER_UI_USER / SWAGGER_UI_PASSWORD; desligar: SWAGGER_BASIC_AUTH_ENABLED=false)
swagger.basic-auth.enabled=${SWAGGER_BASIC_AUTH_ENABLED:true}
swagger.basic-auth.username=${SWAGGER_UI_USER:}
swagger.basic-auth.password=${SWAGGER_UI_PASSWORD:}
