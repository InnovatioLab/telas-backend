# =============================================================
#   Application Properties
# =============================================================
spring.application.name=Telas
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
front.base.url=${FRONT_BASE_URL:https://telas-ads.com}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
rate.limit.enabled=${RATE_LIMIT_ENABLED:true}
rate.limit.requests-per-period=${RATE_LIMIT_REQUESTS_PER_PERIOD:120}
rate.limit.refresh-period-seconds=${RATE_LIMIT_REFRESH_PERIOD_SECONDS:60}
rate.limit.cache-max-entries=${RATE_LIMIT_CACHE_MAX_ENTRIES:50000}
# ==============================================================
# = Server Properties
# ==============================================================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
# =============================================================
#   Database (JPA, Flyway)
# =============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
# =============================================================
#   JPA
# =============================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
# =============================================================
#   Monitoring (API key for /boxes/health, heartbeat, box logs)
# =============================================================
monitoring.api.key=${MONITORING_API_KEY:dev-monitoring-key}
monitoring.box-script.target-version=${MONITORING_BOX_SCRIPT_TARGET_VERSION:}
monitoring.box-script.artifact.url=${MONITORING_BOX_SCRIPT_ARTIFACT_URL:}
monitoring.box-script.artifact.sha256=${MONITORING_BOX_SCRIPT_ARTIFACT_SHA256:}
monitoring.heartbeat.stale-seconds=180
monitoring.ping.enabled=true
monitoring.ping.timeout-seconds=3
# Docker/Dokploy: ICMP (ping / InetAddress.isReachable) costuma falhar sem raw sockets.
# A sonda TCP na porta do box-script (HTTP local) funciona com Tailscale apenas com roteamento L3.
monitoring.ping.tcp-probe-enabled=true
monitoring.ping.tcp-probe-ports=8081
monitoring.ping.tcp-probe-timeout-ms=3000
monitoring.ping.icmp-enabled=true
monitoring.ping.java-reachable-fallback-enabled=true
monitoring.heartbeat.never-seen-grace-seconds=600
monitoring.heartbeat.reboot-detection-enabled=true
monitoring.heartbeat.reboot-min-uptime-drop-seconds=60
monitoring.worker.interval-ms=60000
monitoring.log.retention.days=${MONITORING_LOG_RETENTION_DAYS:60}
monitoring.log.retention.cron=0 0 3 * * *
app.scheduler.zone=${APP_SCHEDULER_ZONE:America/New_York}
subscription.cron.remove-expired-ads=0 0 4 * * *
subscription.cron.expiry-emails=0 0 6 * * *
cleanup.ads.enabled=${CLEANUP_ADS_ENABLED:true}
cleanup.ads.retention.days=${CLEANUP_ADS_RETENTION_DAYS:30}
cleanup.ads.cron=0 0 5 * * *
cleanup.ads.zone=${CLEANUP_ADS_ZONE:${app.scheduler.zone}}
scheduler.prerun.email.enabled=${SCHEDULER_PRERUN_EMAIL_ENABLED:true}
# Worker: fixedDelay 60000 ms = ~1 min; ShedLock lockAtMost PT120S so Kasa serial checks can finish.
# Kasa / Tapo / TP-Link smart plugs (worker + admin API)
monitoring.kasa.enabled=true
# sidecar = POST {sidecar-url}/read (tomada real). stub = valores fixos só para teste sem hardware.
monitoring.kasa.mode=sidecar
monitoring.kasa.sidecar-url=http://127.0.0.1:8099
monitoring.kasa.sidecar-timeout-ms=8000
monitoring.kasa.raise-incidents=true
# Relay ON but power below threshold for min-readings-below consecutive checks: POWER_LOSS (e.g. no load / mains).
monitoring.kasa.power-below-watts=5.0
monitoring.kasa.min-readings-below=3
monitoring.kasa.deactivate-monitor-on-incident-types=POWER_LOSS
monitoring.kasa.encryption-key=${MONITORING_KASA_ENCRYPTION_KEY:}
spring.jpa.properties.hibernate.default_schema=public
# =============================================================
#   Envers
# =============================================================
spring.jpa.properties.org.hibernate.envers.revision_field_name=audit_id
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=audit_type
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
# =============================================================
#   Flyway 
# =============================================================
spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_USER}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration
# =============================================================
#   File Upload Configuration
# =============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB
# =============================================================
#   Email Configuration
# =============================================================
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
sendgrid.api.key=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# FREEMARKER
spring.freemarker.allowRequestOverride=false
spring.freemarker.allowSessionOverride=false
spring.freemarker.cache=true
spring.freemarker.checkTemplateLocation=true
spring.freemarker.contentType=text/html
spring.freemarker.exposeRequestAttributes=false
spring.freemarker.exposeSessionAttributes=false
spring.freemarker.exposeSpringMacroHelpers=false
spring.freemarker.suffix=.ftl
spring.freemarker.charset=UTF-8
spring.freemarker.templateLoaderPath=classpath:/templates
# =============================================================
#   Storage Config
# =============================================================
bucket.endpoint=${BUCKET_ENDPOINT}
bucket.name=${BUCKET_NAME}
bucket.access.key=${BUCKET_ACCESS_KEY}
bucket.secret.key=${BUCKET_SECRET_KEY}
# ==============================================================
#   Swagger properties
# ==============================================================
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
swagger.server.url=https://api.telas-ads.com/api
swagger.basic-auth.enabled=${SWAGGER_BASIC_AUTH_ENABLED:false}
swagger.basic-auth.username=${SWAGGER_UI_USER:}
swagger.basic-auth.password=${SWAGGER_UI_PASSWORD:}
# ==============================================================
#   Actuator properties
# =============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
management.endpoint.prometheus.enabled=true
management.endpoint.shutdown.enabled=${MANAGEMENT_SHUTDOWN_ENABLED:true}
management.health.mail.enabled=false
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.enable.hibernate=false
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=off
logging.level.com.telas.services.impl.SubscriptionServiceImpl=warn
#   Geolocalizacao Service
# =============================================================
geolocalizacao.service.url=${GEOLOCALIZACAO_SERVICE_URL:https://maps.googleapis.com/maps/api/geocode/json}
geolocalizacao.service.key=${GEOLOCALIZACAO_SERVICE_KEY}
# ==============================================================
#   Token
# =============================================================
api.security.token.secret=${TOKEN_SECRET}
# =============================================================
#   PAYMENT
# =============================================================
#payment.gateway.url=${PAYMENT_GATEWAY_URL}
payment.gateway.key=${PAYMENT_GATEWAY_API_KEY}
payment.gateway.webhook.secret=${PAYMENT_GATEWAY_WEBHOOK_SECRET}
stripe.product.id=${STRIPE_PRODUCT_ID}
# =============================================================
#   QUEUE
# =============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.requested-heartbeat=30
spring.rabbitmq.cache.channel.size=25
spring.rabbitmq.connection-timeout=10s
spring.rabbitmq.listener.simple.acknowledge-mode=${RABBITMQ_ACKNOWLEDGE_MODE:manual}
queue.name=${QUEUE_NAME:stripe.webhook.queue}
exchange.name=${EXCHANGE_NAME:stripe.webhook.exchange}
routing.key=${ROUTING_KEY:stripe.webhook.routing.key}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=5
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.default-requeue-rejected=false
# ==============================================================
#   Loki properties
# =============================================================
loki.url=${LOKI_URL}